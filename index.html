<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acrilzano — Dashboard de Produção</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0d1117;--card:#161b22;--card2:#1c2128;--border:#30363d;--text:#e6edf3;--muted:#7d8590;--accent:#2f81f7;--green:#3fb950;--amber:#d29922;--red:#f85149;--purple:#bc8cff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#2f81f7,#1a6fd4);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;}
.logo-name{font-size:1rem;font-weight:800;color:var(--text);}
.logo-sub{font-size:.6rem;color:var(--muted);}
.hright{display:flex;align-items:center;gap:10px;}
.live{display:flex;align-items:center;gap:5px;font-size:.68rem;color:var(--green);font-weight:600;}
.ldot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tab-group{display:flex;background:var(--card2);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.tab-btn{padding:6px 16px;font-size:.73rem;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'Figtree',sans-serif;transition:.2s;}
.tab-btn.on{background:var(--accent);color:#fff;}
.wsel{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;font-size:.75rem;font-weight:600;cursor:pointer;font-family:'Figtree',sans-serif;outline:none;}
.wbadge{background:var(--accent);color:#fff;padding:5px 14px;border-radius:20px;font-size:.7rem;font-weight:700;}
main{padding:20px 28px;max-width:1600px;margin:0 auto;}
.view{display:none;}.view.on{display:block;}
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:15px;position:relative;overflow:hidden;transition:.2s;}
.kpi:hover{transform:translateY(-1px);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.bl::before{background:var(--accent)}.kpi.gr::before{background:var(--green)}.kpi.am::before{background:var(--amber)}.kpi.rd::before{background:var(--red)}.kpi.pu::before{background:var(--purple)}
.kpi-l{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:7px;}
.kpi-v{font-size:1.5rem;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1;margin-bottom:4px;}
.kpi.bl .kpi-v{color:var(--accent)}.kpi.gr .kpi-v{color:var(--green)}.kpi.am .kpi-v{color:var(--amber)}.kpi.rd .kpi-v{color:var(--red)}.kpi.pu .kpi-v{color:var(--purple)}
.kpi-s{font-size:.65rem;color:var(--muted);}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:20px;}
.ct{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.ct::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--accent);}
.charts{display:grid;grid-template-columns:1fr 300px;gap:16px;margin-bottom:20px;}
canvas{max-height:220px;}
.clist{display:flex;flex-direction:column;gap:12px;}
.citem{display:flex;align-items:center;gap:11px;}
.cring{width:50px;height:50px;border-radius:50%;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center;}
.cring::after{content:'';position:absolute;inset:7px;border-radius:50%;background:var(--card);}
.cring span{font-size:.72rem;font-weight:800;font-family:'JetBrains Mono',monospace;position:relative;z-index:1;}
.cinfo{flex:1;}.clbl{font-size:.7rem;font-weight:700;margin-bottom:2px;}.csub{font-size:.62rem;color:var(--muted);}
.cpct{font-size:.85rem;font-weight:800;font-family:'JetBrains Mono',monospace;}
.blist{display:flex;flex-direction:column;gap:7px;}
.bitem{display:grid;grid-template-columns:140px 1fr 58px;align-items:center;gap:10px;}
.bn{font-size:.67rem;color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bt{background:rgba(255,255,255,.05);border-radius:3px;height:6px;overflow:hidden;}
.bf{height:100%;border-radius:3px;}
.bp{font-size:.67rem;font-family:'JetBrains Mono',monospace;font-weight:600;text-align:right;}
.tcard{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px;}
.ttop{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--card2);}
.ttl{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.filters{display:flex;gap:5px;}
.fb{padding:4px 11px;border-radius:6px;font-size:.63rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:.15s;font-family:'Figtree',sans-serif;}
.fb.on,.fb:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.7rem;}
thead th{padding:9px 11px;text-align:right;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);background:var(--card2);border-bottom:1px solid var(--border);white-space:nowrap;}
thead th:first-child{text-align:left;}thead th:nth-child(2){text-align:center;}
tbody tr{border-bottom:1px solid rgba(48,54,61,.5);transition:.12s;}
tbody tr:hover{background:rgba(255,255,255,.02);}
tbody td{padding:8px 11px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:.66rem;white-space:nowrap;}
tbody td:first-child{font-family:'Figtree',sans-serif;font-weight:600;font-size:.7rem;text-align:left;}
tbody td:nth-child(2){text-align:center;}
.chip{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.6rem;font-weight:700;font-family:'Figtree',sans-serif;}
.ca{background:rgba(47,129,247,.15);color:#79b8ff;}.cb{background:rgba(188,140,255,.15);color:#bc8cff;}.cc{background:rgba(255,123,114,.15);color:#ff7b72;}
.pc{display:flex;align-items:center;gap:7px;justify-content:flex-end;}
.mb{width:36px;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
.mf{height:100%;border-radius:2px;}
.cg{color:#3fb950;font-weight:700;}.cr{color:#f85149;font-weight:700;}.cy{color:#d29922;font-weight:700;}
tfoot td{padding:10px 11px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:700;background:rgba(47,129,247,.08);border-top:1px solid var(--border);color:var(--accent);}
tfoot td:first-child{font-family:'Figtree',sans-serif;color:var(--text);text-align:left;}
tfoot td:nth-child(2){text-align:center;}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-top:14px;}
.ci{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.cp{font-weight:700;font-size:.7rem;margin-bottom:8px;}
.cr2{display:grid;grid-template-columns:90px 1fr 52px;align-items:center;gap:7px;margin-bottom:4px;}
.cwk{font-size:.6rem;color:var(--muted);font-weight:600;}
.ctr{background:rgba(255,255,255,.06);border-radius:2px;height:5px;}
.cfi{height:100%;border-radius:2px;}
.cpn{font-size:.62rem;font-family:'JetBrains Mono',monospace;font-weight:700;text-align:right;}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px;}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:.2s;position:relative;overflow:hidden;}
.mcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);}
.mcard:hover{border-color:var(--accent);transform:translateY(-1px);}
.mcard.ativo{border-color:var(--accent);background:rgba(47,129,247,.08);}
.mnome{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;}
.mtotal{font-size:1.3rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--accent);margin-bottom:3px;}
.mpct{font-size:.72rem;font-weight:700;font-family:'JetBrains Mono',monospace;}
.mbar{height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:8px;overflow:hidden;}
.mbar-f{height:100%;border-radius:2px;background:var(--accent);}
.msems{font-size:.6rem;color:var(--muted);margin-top:5px;}
.mes-sel{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.mes-btn{padding:6px 16px;border-radius:8px;font-size:.72rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:.15s;font-family:'Figtree',sans-serif;}
.mes-btn.on,.mes-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
footer{text-align:center;padding:16px;font-size:.63rem;color:var(--muted);border-top:1px solid var(--border);}
@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(3,1fr)}.charts{grid-template-columns:1fr}}
@media(max-width:600px){main{padding:14px}header{padding:0 14px}.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
<div class="logo">
<div class="logo-icon">🏭</div>
<div><div class="logo-name">Acrilzano</div><div class="logo-sub">Dashboard de Producao</div></div>
</div>
<div class="hright">
<div class="live"><div class="ldot"></div>Ao vivo</div>
<div class="tab-group">
<button class="tab-btn on" onclick="mudarView('semanal',this)">Semanal</button>
<button class="tab-btn" onclick="mudarView('mensal',this)">Mensal</button>
</div>
<select class="wsel" id="semSel" onchange="trocar(this.value)">
<option value="0">02-08 Mar</option>
<option value="1">09-15 Mar</option>
