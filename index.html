<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produção Semanal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0d1117;--card:#161b22;--card2:#1c2128;--border:#30363d;--text:#e6edf3;--muted:#7d8590;--accent:#2f81f7;--green:#3fb950;--amber:#d29922;--red:#f85149;--purple:#bc8cff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1rem;}
.dot{width:8px;height:8px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.wpill{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:.75rem;font-weight:700;color:var(--accent);}
main{padding:22px 28px;max-width:1500px;margin:0 auto;}
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden;transition:.2s;}
.kpi:hover{transform:translateY(-1px);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.bl::before{background:var(--accent)}.kpi.gr::before{background:var(--green)}.kpi.am::before{background:var(--amber)}.kpi.rd::before{background:var(--red)}.kpi.pu::before{background:var(--purple)}
.kpi-l{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;}
.kpi-v{font-size:1.6rem;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1;margin-bottom:4px;}
.kpi.bl .kpi-v{color:var(--accent)}.kpi.gr .kpi-v{color:var(--green)}.kpi.am .kpi-v{color:var(--amber)}.kpi.rd .kpi-v{color:var(--red)}.kpi.pu .kpi-v{color:var(--purple)}
.kpi-s{font-size:.68rem;color:var(--muted);}
.charts{display:grid;grid-template-columns:1fr 300px;gap:16px;margin-bottom:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;}
.ct{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.ct::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--accent);}
.blist{display:flex;flex-direction:column;gap:7px;}
.bitem{display:grid;grid-template-columns:140px 1fr 60px;align-items:center;gap:10px;}
.bn{font-size:.68rem;color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bt{background:rgba(255,255,255,.05);border-radius:3px;height:6px;overflow:hidden;}
.bf{height:100%;border-radius:3px;}
.bp{font-size:.68rem;font-family:'JetBrains Mono',monospace;font-weight:600;text-align:right;}
.clist{display:flex;flex-direction:column;gap:14px;}
.citem{display:flex;align-items:center;gap:12px;}
.cring{width:52px;height:52px;border-radius:50%;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center;}
.cring span{font-size:.75rem;font-weight:800;font-family:'JetBrains Mono',monospace;position:relative;z-index:1;}
.cring::after{content:'';position:absolute;inset:7px;border-radius:50%;background:var(--card);}
.cinfo{flex:1;}.clbl{font-size:.72rem;font-weight:700;margin-bottom:2px;}.csub{font-size:.65rem;color:var(--muted);}
.cpct{font-size:.85rem;font-weight:800;font-family:'JetBrains Mono',monospace;}
.tcard{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px;}
.thead{background:var(--card2);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.ttl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.filters{display:flex;gap:6px;}
.fb{padding:4px 12px;border-radius:6px;font-size:.65rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:.15s;font-family:'Figtree',sans-serif;}
.fb.on,.fb:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.72rem;}
thead th{padding:9px 12px;text-align:right;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);background:var(--card2);border-bottom:1px solid var(--border);white-space:nowrap;}
thead th:first-child{text-align:left;}thead th:nth-child(2){text-align:center;}
tbody tr{border-bottom:1px solid rgba(48,54,61,.5);transition:.12s;}
tbody tr:hover{background:rgba(255,255,255,.02);}
tbody td{padding:8px 12px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:.68rem;white-space:nowrap;}
tbody td:first-child{font-family:'Figtree',sans-serif;font-weight:600;font-size:.72rem;text-align:left;}
tbody td:nth-child(2){text-align:center;}
.chip{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.6rem;font-weight:700;font-family:'Figtree',sans-serif;}
.ca{background:rgba(47,129,247,.15);color:#79b8ff;}.cb{background:rgba(188,140,255,.15);color:#bc8cff;}.cc{background:rgba(255,123,114,.15);color:#ff7b72;}
.pc{display:flex;align-items:center;gap:8px;justify-content:flex-end;}
.mb{width:36px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
.mf{height:100%;border-radius:2px;}
.cg{color:#3fb950;font-weight:700;}.cr{color:#f85149;font-weight:700;}.cy{color:#d29922;font-weight:700;}
tfoot td{padding:10px 12px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;background:rgba(47,129,247,.08);border-top:1px solid var(--border);color:var(--accent);}
tfoot td:first-child{font-family:'Figtree',sans-serif;color:var(--text);text-align:left;}
tfoot td:nth-child(2){text-align:center;}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-top:14px;}
.ci{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.cp{font-weight:700;font-size:.72rem;margin-bottom:8px;}
.cr2{display:grid;grid-template-columns:70px 1fr 55px;align-items:center;gap:8px;margin-bottom:4px;}
.cwk{font-size:.6rem;color:var(--muted);font-weight:600;}
.ctr{background:rgba(255,255,255,.06);border-radius:2px;height:5px;}
.cfi{height:100%;border-radius:2px;}
.cpn{font-size:.62rem;font-family:'JetBrains Mono',monospace;font-weight:700;text-align:right;}
footer{text-align:center;padding:16px;font-size:.65rem;color:var(--muted);border-top:1px solid var(--border);}
@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(3,1fr)}.charts{grid-template-columns:1fr}}
@media(max-width:600px){main{padding:14px}header{padding:12px 14px}.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style></head><body>
